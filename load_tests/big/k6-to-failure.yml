apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
data:
  script.js: |
    import http from 'k6/http';
    export const options = {
      thresholds: {
        http_req_failed: ['rate<0.01'],
        http_req_duration: ['p(99)<200'],
      },
      scenarios: {
        breakpoint: {
          executor: 'ramping-arrival-rate',
          startRate: 25,
          timeUnit: '1s',
          preAllocatedVUs: 50,
          maxVUs: 500,
          stages: [
            { duration: '2m',  target: 500  },
            { duration: '2m',  target: 1000 },
            { duration: '2m',  target: 2000 },
            { duration: '2m',  target: 3000 },
            { duration: '2m',  target: 4000 },
          ],
        },
      },
    };
    export default function () {
      http.get('http://petclinic:80/');
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: grafanak6
          image: grafana/k6
          command: ["k6", "run", "--summary-trend-stats=p(50),p(95),p(99),max", "/scripts/script.js"]
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
      volumes:
        - name: k6-script
          configMap:
            name: k6-script
