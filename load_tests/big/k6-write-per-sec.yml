apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
data:
  script.js: |
    import http from 'k6/http';
    export const options = {
      scenarios: {
        rps: {
          executor: 'ramping-arrival-rate',
          exec: 'req_per_sec',
          startRate: 10,
          preAllocatedVUs: 200,
          maxVUs: 2000,
          timeUnit: '1s',
          stages: [
            { duration: '30s', target: 100 },
            { duration: '30s', target: 500 },
            { duration: '30s', target: 2500 },
          ]
        }, 
        writes: {
          executor: 'constant-arrival-rate',
          duration: '60s',
          preAllocatedVUs: 200,
          startTime: '90s',
          rate: 5000,
          timeUnit: '1s',
          exec: 'writes_per_sec',
        }
      },
    };
    export function req_per_sec() {
      const data = {
        firstName: 'falseFirst',
        lastName: 'myLast',
        address: '123',
        city: '123',
        telephone: '1231231234'
      }
      const header = {"Content-Type": "application/x-www-form-urlencoded"}
      http.post('http://petclinic:80/owners/new', data, {headers: header, redirects: 0})
    }
    export function writes_per_sec() {
      const data = {
        firstName: 'myFirst',
        lastName: 'myLast',
        address: '123',
        city: '123',
        telephone: '1231231234'
      }
      const header = {"Content-Type": "application/x-www-form-urlencoded"}
      http.post('http://petclinic:80/owners/new', data, {headers: header, redirects: 0})
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: k6
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: grafanak6
          image: grafana/k6
          command: ["k6", "run", "/scripts/script.js"]
          volumeMounts:
            - name: k6-script
              mountPath: /scripts
      volumes:
        - name: k6-script
          configMap:
            name: k6-script
